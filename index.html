<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Platformer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="announcement-banner" style="display: none;"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="ui" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 780px; padding: 0 10px;">
                <div style="width: 150px;">Level: <span id="level-display">1</span></div>
                <div id="timer-display" style="font-family: monospace; font-weight: bold; font-size: 24px; flex: 1; text-align: center;">00:00.00</div>
                <div style="width: 150px; text-align: right;">
                    <button onclick="resetRun()" style="padding: 5px 10px; font-size: 12px; background: #ff4757; box-shadow: 0 2px #c0392b;">Reset Run</button>
                </div>
            </div>
        </div>

        <!-- Title Screen -->
        <div id="title-screen" class="overlay">
            <h1>JS PLATFORMER</h1>
            <p>Speedrun Edition</p>
            <div class="menu-buttons">
                <button onclick="startGame()">Start Game</button>
                <button onclick="showLeaderboard()">High Scores</button>
                <button onclick="showControls()">Controls</button>
                <button onclick="window.location.href='editor.html'">Level Editor</button>
                <button id="admin-panel-btn" onclick="showAdminPanel()" style="display: none; background: #3498db; box-shadow: 0 4px #2980b9;">Admin Panel</button>
            </div>
            <p id="admin-login-link" onclick="adminLogin()" style="font-size: 10px; opacity: 0.3; margin-top: 20px; cursor: pointer;">Admin Login</p>
        </div>

        <!-- Controls Screen -->
        <div id="controls-screen" class="overlay" style="display: none;">
            <h2>CONTROLS</h2>
            <div id="controls-list" style="text-align: left; margin-bottom: 20px;">
                <div class="control-item"><span>Move Left:</span> <button class="key-btn" id="key-left" onclick="remapKey('left')">ArrowLeft</button></div>
                <div class="control-item"><span>Move Right:</span> <button class="key-btn" id="key-right" onclick="remapKey('right')">ArrowRight</button></div>
                <div class="control-item"><span>Jump:</span> <button class="key-btn" id="key-jump" onclick="remapKey('jump')">Space</button></div>
                <div class="control-item"><span>Reset Level:</span> <button class="key-btn" id="key-reset" onclick="remapKey('reset')">KeyR</button></div>
                <div class="control-item"><span>Back to Menu:</span> <button class="key-btn">Esc</button></div>
            </div>
            <p style="font-size: 14px; opacity: 0.7; margin-bottom: 20px;">Click a button then press any key to remap.</p>
            <button onclick="showTitle()">Back</button>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboard-screen" class="overlay" style="display: none;">
            <h2>HIGH SCORES</h2>
            <div id="highscore-list" style="margin-bottom: 20px; min-width: 300px;">
                <p>Loading...</p>
            </div>
            <button onclick="showTitle()">Back</button>
        </div>

        <!-- Win Screen -->
        <div id="win-screen" class="overlay" style="display: none;">
            <h2>YOU WIN!</h2>
            <p id="final-time-text" style="font-size: 24px; color: #2ed573;"></p>
            <div style="margin-top: 20px;">
                <input type="text" id="player-name-input" placeholder="Enter name" maxlength="20" style="padding: 10px; font-size: 18px; border-radius: 5px; border: none; width: 200px;">
                <button id="submit-score-btn" onclick="submitScore()" style="padding: 10px 20px;">Submit Score</button>
            </div>
            <button onclick="resetRun()" style="margin-top: 20px; background: #555; box-shadow: 0 4px #333;">Back to Menu</button>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel" class="overlay" style="display: none;">
            <h2>ADMIN PANEL</h2>
            <div style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px;">
                <textarea id="announcement-input" placeholder="Global announcement message..." rows="3" style="padding: 10px; border-radius: 5px; border: none; width: 100%; font-size: 16px;"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button onclick="postAnnouncement()" style="flex: 1; padding: 10px;">Post/Update</button>
                    <button onclick="clearAnnouncement()" style="flex: 1; padding: 10px; background: #ff4757; box-shadow: 0 4px #c0392b;">Clear All</button>
                </div>
                <hr style="width: 100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
                <h3>Manage Scores</h3>
                <div id="admin-highscore-list" style="max-height: 200px; overflow-y: auto; width: 100%; font-size: 14px;">
                    <p>Loading scores...</p>
                </div>
            </div>
            <button onclick="showTitle()" style="margin-top: 30px; background: #555; box-shadow: 0 4px #333;">Back</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
